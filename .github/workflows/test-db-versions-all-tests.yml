name: Test DB Versions with all tests

# python-version: default as specified
# database-version: all supported by ITDE
# tests: all
#
# Use the specified default version of python and call nox task run_all_tests for
# all versions of Exasol database currently supported by the ITDE.

on:
 workflow_call:

jobs:
  build_matrix:
    name: Read all supported Exasol DB versions
    permissions:
      contents: read
    uses: ./.github/workflows/matrix.yml
    with:
      matrix_keys_json: '["db_versions"]'

  test-db-versions-all-tests:
    needs: build_matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build_matrix.outputs.matrix) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    name: Run all tests for Exasol ${{ matrix.db_versions }}

    steps:
      - name: SCM Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v6
        with:
          python-version: "3.10"
          poetry-version: "2.3.0"

      - name: Allow unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Run all tests
        run: poetry run -- nox -s run-all-tests -- --db-version=${MATRIX_DB_VERSION} --test-set=default
        env:
          MATRIX_DB_VERSION: ${{ matrix.db_versions }}
