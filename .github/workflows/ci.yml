# This should be generated and maintained by the exasol-toolbox.
# However, there is an open issue due to a `merge-gate` needing `write` permissions.
# This will be resolved in:
#  https://github.com/exasol/integration-test-docker-environment/issues/630.1.1.
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  merge-gate:
    name: Merge Gate
    uses: ./.github/workflows/merge-gate.yml
    secrets: inherit
    permissions:
      contents: write

  report:
    name: Report
    needs:
      - merge-gate
    # This condition ensures the job runs if merge-gate finished (success or failure)
    if: |
      always() &&
      needs.merge-gate.result != 'skipped' &&
      needs.merge-gate.result != 'cancelled'
    uses: ./.github/workflows/report.yml
    secrets: inherit
    permissions:
      contents: read
