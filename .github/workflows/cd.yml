# This should be generated and maintained by the exasol-toolbox.
# However, there is an open issue due to a manually added job, which
# will be resolved in:
#  https://github.com/exasol/integration-test-docker-environment/issues/630
name: CD

on:
  push:
    tags:
      - '**'
      - '!v*'

jobs:
  check-release-tag:
    name: Check Release Tag
    uses: ./.github/workflows/check-release-tag.yml
    permissions:
      contents: read

  build-and-publish:
    needs:
      - check-release-tag
    name: Build & Publish
    uses: ./.github/workflows/build-and-publish.yml
    permissions:
      contents: write
    secrets:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  standalone-executable:
    needs:
     - build-and-publish
    name: Create a standalone linux executable
    uses: ./.github/workflows/build-executable.yml
    with:
      release-tag: ${{ github.ref_name }}
    permissions:
      contents: write

  publish-docs:
    needs:
      - build-and-publish
    name: Publish Documentation
    uses: ./.github/workflows/gh-pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
