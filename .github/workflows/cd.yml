# Last generated with exasol-toolbox version 10.0.0.
name: CD

on:
  push:
    tags:
      - '**'
      - '!v*'

jobs:
  check-release-tag:
    name: Check Release Tag
    uses: ./.github/workflows/check-release-tag.yml
    permissions:
      contents: read

  build-and-publish:
    needs:
      - check-release-tag
    name: Build & Publish
    uses: ./.github/workflows/build-and-publish.yml
    permissions:
      contents: write
    secrets:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  cd-extension:
    name: Extension
    uses: ./.github/workflows/cd-extension.yml
    needs:
      - check-release-tag
    permissions:
      contents: write
    with:
      release-tag: ${{ github.ref_name }}

  publish-docs:
    needs:
      - build-and-publish
    name: Publish Documentation
    uses: ./.github/workflows/gh-pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
