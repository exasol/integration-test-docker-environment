name: Test DB Versions with minimal tests

# python-version: default as specified
# database-version: all supported by ITDE
# tests: minimal (dynamic matrix subset)
#
# Use the specified Python versions and execute one minimal dynamic test target
# per matrix entry for all supported Exasol database versions.

on:
 workflow_call:

jobs:
  build_matrix:
    name: Read all supported Exasol DB versions and minimal test targets
    permissions:
      contents: read
    uses: ./.github/workflows/matrix.yml
    with:
      matrix_keys_json: '["db_versions", "minimal_integration_test_targets"]'

  test-db-versions-minimal:
    name: Run Minimal Tests for Exasol ${{ matrix.db_versions }} (Python ${{ matrix.python-versions }}) - ${{ matrix.minimal_integration_test_targets }}
    needs: build_matrix
    strategy:
      fail-fast: false
      matrix:
        python-versions: ["3.10", "3.14"]
        db_versions: ${{ fromJson(needs.build_matrix.outputs.matrix).db_versions }}
        minimal_integration_test_targets: ${{ fromJson(needs.build_matrix.outputs.matrix).minimal_integration_test_targets }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: SCM Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v6
        with:
          python-version: ${{ matrix.python-versions }}
          poetry-version: "2.3.0"

      - name: Allow unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Run Minimal Tests
        run: poetry run -- nox -s run-integration-tests -- --db-version=${MATRIX_DB_VERSION} --test-target=${MATRIX_TEST_TARGET}
        env:
          MATRIX_DB_VERSION: ${{ matrix.db_versions }}
          MATRIX_TEST_TARGET: ${{ matrix.minimal_integration_test_targets }}
