name: Test Docker GPU

on:
  workflow_call:

jobs:
  build_matrix:
    permissions:
      contents: read
    uses: ./.github/workflows/matrix.yml
    with:
      matrix_keys_json: '["db_versions_gpu_only"]'
  test-docker-gpu:
    name: Run GPU Tests for Exasol  ${{ matrix.db_versions_gpu_only }}
    runs-on:
      labels: int-linux-x64-4core-gpu-t4-ubuntu24.04-1
    permissions:
      contents: read
    needs: build_matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build_matrix.outputs.matrix) }}
    steps:
      - name: SCM Checkout
        uses: actions/checkout@v6
      - name: Setup Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v6
        with:
          python-version: "3.10"
          poetry-version: "2.3.0"

      - name: Log GPU environment
        run: |
          echo Running nvidia-smi
          nvidia-smi
          echo Running nvidia-ctk --version
          nvidia-ctk --version


      - name: Run GPU Tests
        run: poetry run -- nox -s run-all-tests -- --db-version='${{ matrix.db_versions_gpu_only }}' --test-set=gpu-only
